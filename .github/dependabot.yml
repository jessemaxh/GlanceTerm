version: 2

# Reusable group definitions are repeated per-directory below (Dependabot does
# not support YAML anchors across `updates` entries). Each npm directory bundles
# its updates into at most three PRs instead of one-per-dependency:
#   - angular: the framework bumps, kept on their own (coordinated + risky)
#   - production-dependencies / development-dependencies: everything else
# GitHub Actions updates collapse into a single PR.

updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
    time: "04:00"
  open-pull-requests-limit: 20
  groups:
    angular:
      patterns: ["@angular*", "@ngtools*", "zone.js"]
    production-dependencies:
      dependency-type: "production"
    development-dependencies:
      dependency-type: "development"
- package-ecosystem: npm
  directory: "/app"
  schedule:
    interval: daily
    time: "04:00"
  open-pull-requests-limit: 20
  groups:
    angular:
