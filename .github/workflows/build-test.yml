name: Build test (Linux + Windows)

# Manual "does it even compile?" probe for the non-macOS targets. The Linux and
# Windows build scripts (scripts/build-linux.mjs, scripts/build-windows.mjs)
# exist — inherited from Tabby and they DO run the load-bearing prepackage step
# (scripts/prepackage-plugins.mjs) — but they have NOT been hardened/verified for
# GlanceTerm the way macOS was (the app/node_modules refresh + asar self-check
# live only in build-macos.mjs). This runs them on real ubuntu/windows runners
# and uploads whatever they produce so we can see how far the existing scripts
# get. Unsigned (no signing secrets). Does NOT publish a release.
#
# Caveat: green here means it BUILT, not that the artifact RUNS — verifying no
# "asar with zero node_modules" crash needs a real Linux/Windows machine to launch
# it on. Treat this as step 1 of bringing those platforms up.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            script: build-linux.mjs
          # Pinned to windows-2022 on purpose: windows-latest now ships Visual
          # Studio 18 (VS 2026 preview), which node-gyp 11.x doesn't recognise
          # ("unknown version undefined ...\18\Enterprise"), so native rebuilds
          # fail. windows-2022 has VS 2022 (v17), which node-gyp detects. Revisit
          # when node-gyp gains VS 18 support (then windows-latest is fine again).
          - name: Windows
            os: windows-2022
            script: build-windows.mjs
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libsecret-1-dev libarchive-tools rpm fakeroot

      # build/installer.nsh bundles the VC++ runtime (node-pty needs
      # vcruntime140.dll) via `File "${BUILD_RESOURCES_DIR}\vc_redist.exe"`, but
      # that binary isn't committed — fetch it before packaging or makensis aborts.
      - name: Windows — fetch VC++ redistributable
        if: runner.os == 'Windows'
        shell: bash
        run: curl -fL -o build/vc_redist.exe https://aka.ms/vs/17/release/vc_redist.x64.exe

      - name: Install dependencies
        run: yarn install --network-timeout 1000000

      - name: Build (${{ matrix.name }})
        run: node scripts/${{ matrix.script }}

      # Launch smoke test: install/launch the built app HEADLESS and wait for it
      # to answer on the Chrome DevTools port. If the asar shipped without
      # node_modules (the macOS-only failure mode), the main process crashes
      # before the renderer comes up and CDP never responds → this fails. Green
      # here = "it actually launches", not just "it built".
      - name: Linux — launch smoke (Electron up via CDP)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          sudo apt-get install -y xvfb
          sudo apt-get install -y ./dist/*.deb
          BIN=$(find /opt -maxdepth 2 -type f -executable 2>/dev/null | grep -iE '/glanceterm$' | head -1)
          echo "binary: ${BIN:-<not found>}"; test -n "$BIN"
          xvfb-run -a "$BIN" --no-sandbox --remote-debugging-port=9222 > /tmp/app.log 2>&1 &
          APP=$!; ok=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9222/json/version >/dev/null 2>&1; then ok=1; break; fi
            kill -0 "$APP" 2>/dev/null || break
            sleep 2
          done
          echo "----- app log (tail) -----"; tail -30 /tmp/app.log || true
          kill "$APP" 2>/dev/null || true
          if grep -qi "cannot find module" /tmp/app.log; then echo "✗ asar/module crash"; exit 1; fi
          if [ "$ok" != 1 ]; then echo "✗ Electron never answered on CDP"; exit 1; fi
          echo "✓ Linux launch smoke passed"

      - name: Windows — launch smoke (Electron up via CDP)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $exe = "dist/win-unpacked/GlanceTerm.exe"
          if (!(Test-Path $exe)) { $exe = (Get-ChildItem -Recurse dist -Filter GlanceTerm.exe -ErrorAction SilentlyContinue | Select-Object -First 1).FullName }
          Write-Host "launching: $exe"
          if (-not $exe) { Write-Error "GlanceTerm.exe not found"; exit 1 }
          $p = Start-Process -FilePath $exe -ArgumentList "--remote-debugging-port=9222","--no-sandbox" -PassThru
          $ok = $false
          for ($i=0; $i -lt 30; $i++) {
            try { Invoke-WebRequest -UseBasicParsing http://localhost:9222/json/version -TimeoutSec 2 | Out-Null; $ok = $true; break } catch {}
            if ($p.HasExited) { break }
            Start-Sleep 2
          }
          try { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue } catch {}
          if (-not $ok) { Write-Error "Electron never answered on CDP"; exit 1 }
          Write-Host "Windows launch smoke passed"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.pacman
            dist/*.tar.gz
            dist/*.exe
            dist/*.zip
          if-no-files-found: warn
