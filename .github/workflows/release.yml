name: Release

# Versioning + releases are fully driven by release-please — you never edit a
# version number by hand:
#   1. On every push to main, release-please reads the conventional commits since
#      the last release and maintains a single open "Release PR" that bumps the
#      version in app/package.json (+ writes CHANGELOG.md). `fix:` -> patch,
#      `feat:` -> minor, `feat!:` / `BREAKING CHANGE` -> major.
#   2. Merge that PR when you want to ship. release-please then tags vX.Y.Z and
#      creates the GitHub release; the `build` job below builds the signed,
#      notarized dual-arch dmgs and attaches them to that release.
#
# Why the build lives in THIS workflow (gated on release_created) rather than a
# separate tag-triggered one: a tag pushed by GITHUB_TOKEN does NOT trigger other
# workflows, so a standalone `on: push: tags` release.yml would never fire from
# release-please's tag. Chaining here keeps it to one workflow with no PAT.
#
# The Release-PR flow is also what our branch protection requires — "require a PR
# review on main" blocks CI from direct-pushing a version bump, but a PR the
# maintainer approves + merges is exactly the supported path.
#
# Build details: dual-arch (arm64 on macos-latest, x64 on macos-13), RELEASE=1
# stamps the (release-please-bumped) app/package.json version, Developer-ID signs
# + notarizes when the signing secrets are present (CSC_LINK, CSC_KEY_PASSWORD,
# APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID). Only the .dmg installers
# are attached — electron-builder's .zip / .blockmap / latest-mac.yml are for
# in-app auto-update, which isn't wired up here.
#
# ── Planned (DEFERRED) ────────────────────────────────────────────────────
# Windows (x64 + arm64, NSIS .exe) and Linux (x64 + arm64, AppImage/.deb/.rpm) —
# add matrix entries + the win/linux build commands when implementing.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp

  build:
    name: macOS build (${{ matrix.arch }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest # Apple Silicon
          - arch: x64
            runner: macos-13 # Intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # macOS runners ship Xcode + command-line tools, so the native modules
      # (node-pty, keytar, fontmanager-redux) build without extra system libs.
      # ARCH defaults to the runner's process.arch, so the same command yields
      # arm64 on macos-latest and x64 on macos-13.
      - name: Install dependencies
        run: yarn install --network-timeout 1000000

      - name: Build dmg (RELEASE; signed + notarized when secrets are present)
        run: RELEASE=1 npm run dmg:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Attach the dmg to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/*.dmg --clobber
