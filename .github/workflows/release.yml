name: Release

# Cut a release by pushing a tag like `v0.1.0`:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Builds the macOS dmg for BOTH architectures — Apple Silicon (arm64) on
# macos-latest and Intel (x64) on macos-13 — Developer-ID signs + notarizes
# each, and attaches both .dmg installers to a DRAFT release for review before
# you publish it.
#
# Only the .dmg installers are uploaded. electron-builder also produces .zip /
# .blockmap / latest-mac.yml, but those are purely for in-app auto-update,
# which isn't wired up for this repo — keeping the release page to the two
# installers people actually download.
#
# Signing is opt-in via repo secrets (CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID,
# APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID). Without them build-macos.mjs
# ad-hoc signs (downloaders get a Gatekeeper warning). The tag-only trigger
# keeps secrets off fork PRs.
#
# Version note: RELEASE=1 stamps app/package.json's version, not the tag — bump
# app/package.json before tagging so the dmg version matches.
#
# ── Planned (DEFERRED) ────────────────────────────────────────────────────
# Windows (x64 + arm64, NSIS .exe — needs WIN_CSC_LINK/WIN_CSC_KEY_PASSWORD)
# and Linux (x64 + arm64, AppImage/.deb/.rpm) — add matrix entries + the
# win/linux build commands when implementing.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: macOS build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest # Apple Silicon
          - arch: x64
            runner: macos-13 # Intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # macOS runners ship Xcode + command-line tools, so the native modules
      # (node-pty, keytar, fontmanager-redux) build without extra system libs.
      # ARCH defaults to the runner's process.arch, so the same command yields
      # arm64 on macos-latest and x64 on macos-13.
      - name: Install dependencies
        run: yarn install --network-timeout 1000000

      - name: Build dmg (RELEASE; signed + notarized when secrets are present)
        run: RELEASE=1 npm run dmg:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error

  release:
    name: Draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download both dmgs
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List
        run: ls -lh dist/

      - name: Draft release with both dmgs
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*.dmg
