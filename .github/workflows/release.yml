---
# Fires after Package-Build (build.yml) completes on a tag push. Downloads
# the platform artifacts that workflow produced and attaches them to a draft
# GitHub release named after the tag.
#
# Why workflow_run rather than `push: tags`: build.yml already runs on every
# push (including tag pushes), so the artifacts exist by the time it finishes.
# Triggering this workflow on the same tag push would race build.yml and
# attach nothing. workflow_run guarantees we run *after* build success.
#
# Draft, not published — first releases get manually reviewed (notes, asset
# names, missing platforms) before being made public.
name: tagged-release

on:
  workflow_run:
    workflows: ["Package-Build"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Create draft release with build artifacts
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'push'
      && github.event.workflow_run.conclusion == 'success'
      && startsWith(github.event.workflow_run.head_branch, 'v')
    steps:
      - name: Download artifacts from the Package-Build run
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
          # merge-multiple flattens every artifact into one directory so the
          # `files: artifacts/*` glob below picks them all up regardless of
          # whether the build job named them "macOS .dmg (arm64)" etc.
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh artifacts/ || true

      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          name: ${{ github.event.workflow_run.head_branch }}
          draft: true
          generate_release_notes: true
          files: artifacts/*
