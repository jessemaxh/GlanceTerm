name: Release

# Versioning + releases are fully driven by release-please — you never edit a
# version number by hand:
#   1. On every push to main, release-please reads the conventional commits since
#      the last release and maintains a single open "Release PR" that bumps the
#      version in app/package.json (+ writes CHANGELOG.md). `fix:` -> patch,
#      `feat:` -> minor, `feat!:` / `BREAKING CHANGE` -> major.
#   2. Merge that PR when you want to ship. release-please then tags vX.Y.Z and
#      creates the GitHub release; the `build` job below builds the installers for
#      every platform, smoke-tests them, and attaches them to that release.
#
# Why the build lives in THIS workflow (gated on release_created) rather than a
# separate tag-triggered one: a tag pushed by GITHUB_TOKEN does NOT trigger other
# workflows, so a standalone `on: push: tags` release.yml would never fire from
# release-please's tag. Chaining here keeps it to one workflow with no PAT.
#
# The Release-PR flow is also what our branch protection requires — "require a PR
# review on main" blocks CI from direct-pushing a version bump, but a PR the
# maintainer approves + merges is exactly the supported path.
#
# Platforms: macOS arm64 (Apple-signed + notarized), Linux x64
# (AppImage/deb/rpm/pacman/tar.gz, unsigned), Windows x64
# (NSIS .exe + portable .zip, UNSIGNED → SmartScreen "unknown publisher" warning).
# RELEASE=1 stamps the release-please-bumped app/package.json version. Every build
# is gated by a launch smoke test — a platform that fails to launch is simply not
# attached, the rest still ship. macOS uses a CDP renderer-bootstrap smoke (a
# splash hang leaves the process + CDP up while the UI never loads — exactly how
# v0.3.0 shipped broken); Linux/Windows use a lighter "process/CDP up" smoke.
#
# Intel macOS (x64): DROPPED 2026-06-26. The arm64-runner cross-compile produced
# an app that launches but hangs on the splash (its native modules aren't really
# x64), and there's no hosted Intel runner to build/validate it properly — so the
# binary would ship broken. arm64 is the only macOS target. (Earlier 2026-06-24
# cross-compile + per-arch feed-merge machinery is in git history if ever revived.)
#
# ── Planned (DEFERRED) ────────────────────────────────────────────────────
# Windows pinned to windows-2022 (windows-latest ships VS 18, which node-gyp 11.x
# can't detect). Windows code-signing + Linux/Windows arm64 are still TODO.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp

  build:
    name: ${{ matrix.name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
            arch: arm64
          - name: Linux x64
            os: ubuntu-latest
          - name: Windows x64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libsecret-1-dev libarchive-tools rpm fakeroot

      # build/installer.nsh bundles the VC++ runtime via File ${BUILD_RESOURCES_DIR}\vc_redist.exe
      - name: Windows — fetch VC++ redistributable
        if: matrix.os == 'windows-2022'
        shell: bash
        run: curl -fL -o build/vc_redist.exe https://aka.ms/vs/17/release/vc_redist.x64.exe

      - name: Install dependencies
        run: yarn install --network-timeout 1000000

      # REQUIRE_SIGNED=1 makes the build hard-fail (rather than ad-hoc fall back)
      # if any signing secret is missing — a release must be Developer-ID signed
      # + notarized, both for Gatekeeper and because it's the auto-update trust
      # anchor. The build also asserts codesign/spctl on the .app and .dmg.
      - name: Build macOS (signed + notarized — REQUIRED for release)
        if: matrix.os == 'macos-latest'
        run: RELEASE=1 ARCH=${{ matrix.arch }} npm run dmg:mac
        env:
          REQUIRE_SIGNED: '1'
          KEEP_DIR_BUILD: '1'   # keep the unpacked .app so the launch smoke can run it
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # A "process up" check (like the Linux/Windows smokes below) does NOT catch
      # a SPLASH HANG — the main process + CDP stay alive while the renderer never
      # bootstraps (exactly how v0.3.0 shipped broken). This probes the renderer
      # DOM via CDP and FAILS the build if the app never reaches the app UI.
      - name: macOS — launch smoke (renderer bootstraps, not just process up)
        if: matrix.os == 'macos-latest'
        run: |
          APP=$(find dist -maxdepth 2 -name 'GlanceTerm.app' -type d | head -1)
          echo "smoke target: $APP"
          node scripts/mac-launch-smoke.mjs "$APP"

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: RELEASE=1 node scripts/build-linux.mjs

      - name: Build Windows
        if: matrix.os == 'windows-2022'
        run: node scripts/build-windows.mjs
        env:
          RELEASE: '1'

      # Launch smoke gate (Linux + Windows). Install/launch the built app headless
      # and confirm Electron comes up — catches the asar-without-node_modules crash.
      - name: Linux — launch smoke (Electron up via CDP)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -uo pipefail
          sudo apt-get install -y xvfb
          sudo apt-get install -y ./dist/*.deb
          PKG=$(dpkg-deb -f dist/*.deb Package)
          BIN=$(dpkg -L "$PKG" | while read -r f; do
            [ -f "$f" ] && [ -x "$f" ] || continue
            case "$f" in *.so|*.so.*|*.node|*chrome-sandbox|*crashpad*) continue;; esac
            case "$(file -b "$f" 2>/dev/null)" in *ELF*executable*) echo "$f"; break;; esac
          done | head -1)
          echo "package: $PKG  binary: ${BIN:-<none>}"
          if [ -z "$BIN" ]; then echo "✗ app binary not found"; exit 1; fi
          xvfb-run -a "$BIN" --no-sandbox --disable-gpu --disable-software-rasterizer --remote-debugging-port=9222 > /tmp/app.log 2>&1 &
          APP=$!; ok=0
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9222/json/version >/dev/null 2>&1 && { ok=1; break; }
            kill -0 "$APP" 2>/dev/null || break
            sleep 2
          done
          echo "----- app log (tail) -----"; tail -40 /tmp/app.log || true
          kill "$APP" 2>/dev/null || true
          if grep -qi "cannot find module" /tmp/app.log; then echo "✗ asar/module crash"; exit 1; fi
          if [ "$ok" != 1 ]; then echo "✗ Electron never answered on CDP"; exit 1; fi
          echo "✓ Linux launch smoke passed"

      - name: Windows — launch smoke (no crash; CDP if reachable)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $exe = "dist/win-unpacked/GlanceTerm.exe"
          if (!(Test-Path $exe)) { $exe = (Get-ChildItem -Recurse dist -Filter GlanceTerm.exe -ErrorAction SilentlyContinue | Select-Object -First 1).FullName }
          Write-Host "launching: $exe"
          if (-not $exe) { Write-Error "GlanceTerm.exe not found"; exit 1 }
          $p = Start-Process -FilePath $exe -ArgumentList "--remote-debugging-port=9222","--no-sandbox","--disable-gpu","--disable-software-rasterizer" -PassThru
          $ok = $false
          for ($i=0; $i -lt 20; $i++) {
            try { Invoke-WebRequest -UseBasicParsing http://127.0.0.1:9222/json/version -TimeoutSec 2 | Out-Null; $ok = $true; break } catch {}
            if ($p.HasExited) { Write-Host "process exited early, code $($p.ExitCode)"; break }
            Start-Sleep 2
          }
          $alive = -not $p.HasExited
          try { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue } catch {}
          if ($ok)    { Write-Host "✓ Windows launch smoke passed (CDP up)"; exit 0 }
          if ($alive) { Write-Host "✓ Windows launch smoke passed (launched, stayed alive — no asar crash)"; exit 0 }
          Write-Error "✗ app exited early (likely an asar/startup crash)"; exit 1

      - name: Attach installers to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          # macOS: .dmg for humans PLUS the electron-updater zip (Squirrel.Mac
          # updates from the zip, not the dmg) and its .blockmap. The mac zip is
          # `*-macos-*.zip`, distinct from Windows' `*-portable-*.zip`.
          # NOTE: latest-mac.yml is uploaded by the NEXT step, after these
          # installers, so the auto-update feed never points at zips not yet up.
          # Linux: all package formats. Windows: setup .exe + portable .zip.
          files=(dist/*.dmg dist/*-macos-*.zip dist/*-macos-*.zip.blockmap dist/*.AppImage dist/*.deb dist/*.rpm dist/*.pacman dist/*.tar.gz dist/*.exe dist/*-portable-*.zip)
          echo "uploading: ${files[*]}"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${files[@]}" --clobber

      # macOS only: upload latest-mac.yml LAST — after the installers above are on
      # the release. electron-updater's GitHub provider fetches exactly this file;
      # uploading it after the zips ensures the feed never points at a zip that
      # isn't there yet (which would 404 → broken auto-update). The build is
      # single-arch (arm64), so this file is already the final feed — no per-arch
      # merge needed. (If Intel/x64 is ever re-added, restore the stash +
      # merge-mac-feed.mjs job from git history.)
      - name: Attach macOS update feed (after installers)
        if: startsWith(matrix.os, 'macos')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/latest-mac.yml --clobber
