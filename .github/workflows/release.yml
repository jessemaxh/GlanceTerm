name: Release

# Cut a release by pushing a tag like `v0.1.0`:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Builds the macOS (arm64) dmg with a clean version (RELEASE=1) and attaches it
# to a DRAFT GitHub release for review before you publish it.
#
# Signing is opt-in via repo secrets. With CSC_LINK + CSC_KEY_PASSWORD +
# APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID set, the dmg is
# Developer-ID signed and notarized; without them, scripts/build-macos.mjs
# falls back to ad-hoc signing (downloaders get a Gatekeeper warning).
#
# The tag-only trigger is what keeps the secrets safe on a public repo: only a
# maintainer can push a tag, and GitHub never exposes secrets to fork PRs (the
# CI workflow that does run on PRs carries no secrets).
#
# Version note: RELEASE=1 stamps app/package.json's version (0.1.0), not the
# tag — bump app/package.json before tagging so the dmg version matches.
#
# ── Planned (DEFERRED — not implemented yet) ──────────────────────────────
# Full release matrix: 3 platforms × CPU architectures, each into one draft
# release. To wire up later:
#   - macOS:   arm64 (below, active)  +  x64 (Intel)            → .dmg/.zip
#   - Windows: x64 + arm64  → NSIS .exe  (needs WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD secrets)
#   - Linux:   x64 + arm64  → AppImage / .deb / .rpm           (unsigned)
# Shape it as a `strategy.matrix` of {os, arch, build-cmd} fanning into one
# `softprops/action-gh-release` per tag (the action appends assets to the same
# draft when called from multiple jobs with the same tag). The mac/win/linux
# build commands already exist in scripts/ (build-macos.mjs today); add the
# win/linux equivalents when implementing. Keeping the single macOS-arm64 job
# below as the first slice.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # TODO: expand into a {os, arch} matrix per the "Planned" note above.
  macos:
    name: macOS build + draft release (arm64)
    runs-on: macos-latest # arm64 (macos-14+)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # macOS runners ship Xcode + command-line tools, so the native modules
      # (node-pty, keytar, fontmanager-redux) build without extra system libs.
      - name: Install dependencies
        run: yarn install --network-timeout 1000000

      - name: Build dmg (RELEASE; signed + notarized when secrets are present)
        run: RELEASE=1 npm run dmg:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: List artifacts
        run: ls -lh dist/*.dmg dist/*.zip 2>/dev/null || true

      - name: Draft release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
