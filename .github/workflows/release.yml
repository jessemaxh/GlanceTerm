name: Release

# Versioning + releases are fully driven by release-please — you never edit a
# version number by hand:
#   1. On every push to main, release-please reads the conventional commits since
#      the last release and maintains a single open "Release PR" that bumps the
#      version in app/package.json (+ writes CHANGELOG.md). `fix:` -> patch,
#      `feat:` -> minor, `feat!:` / `BREAKING CHANGE` -> major.
#   2. Merge that PR when you want to ship. release-please then tags vX.Y.Z and
#      creates the GitHub release; the `build` job below builds the installers for
#      every platform, smoke-tests them, and attaches them to that release.
#
# Why the build lives in THIS workflow (gated on release_created) rather than a
# separate tag-triggered one: a tag pushed by GITHUB_TOKEN does NOT trigger other
# workflows, so a standalone `on: push: tags` release.yml would never fire from
# release-please's tag. Chaining here keeps it to one workflow with no PAT.
#
# The Release-PR flow is also what our branch protection requires — "require a PR
# review on main" blocks CI from direct-pushing a version bump, but a PR the
# maintainer approves + merges is exactly the supported path.
#
# Platforms (all x64 unless noted): macOS arm64 (Apple Silicon, signed +
# notarized), Linux x64 (AppImage/deb/rpm/pacman/tar.gz, unsigned), Windows x64
# (NSIS .exe + portable .zip, UNSIGNED → SmartScreen "unknown publisher" warning).
# RELEASE=1 stamps the release-please-bumped app/package.json version. Each
# non-macOS build is gated by a headless launch smoke test (Electron must come up)
# — a platform that fails to launch is simply not attached, the rest still ship.
# macOS needs no separate smoke: build-macos.mjs's afterPack asar self-check
# already catches the "shipped without node_modules" crash at build time.
#
# ── Planned (DEFERRED) ────────────────────────────────────────────────────
# Intel macOS (x64): DROPPED. GitHub's hosted Intel runners (macos-13) are a
# scarce, being-deprecated pool — x64 jobs sat queued 30+ min with no pickup. arm64
# binaries can't run on Intel (Rosetta translates Intel->arm only), so macOS ships
# Apple Silicon only. To revisit: cross-build x64/universal on an arm64 runner
# (verify native modules on a real Intel Mac) or a self-hosted Intel runner.
# Windows pinned to windows-2022 (windows-latest ships VS 18, which node-gyp 11.x
# can't detect). Windows code-signing + Linux/Windows arm64 are still TODO.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp

  build:
    name: ${{ matrix.name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-latest
          - name: Linux x64
            os: ubuntu-latest
          - name: Windows x64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libsecret-1-dev libarchive-tools rpm fakeroot

      # build/installer.nsh bundles the VC++ runtime via File ${BUILD_RESOURCES_DIR}\vc_redist.exe
      - name: Windows — fetch VC++ redistributable
        if: matrix.os == 'windows-2022'
        shell: bash
        run: curl -fL -o build/vc_redist.exe https://aka.ms/vs/17/release/vc_redist.x64.exe

      - name: Install dependencies
        run: yarn install --network-timeout 1000000

      - name: Build macOS (signed + notarized when secrets present)
        if: matrix.os == 'macos-latest'
        run: RELEASE=1 npm run dmg:mac
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: RELEASE=1 node scripts/build-linux.mjs

      - name: Build Windows
        if: matrix.os == 'windows-2022'
        run: node scripts/build-windows.mjs
        env:
          RELEASE: '1'

      # Launch smoke gate (Linux + Windows). Install/launch the built app headless
      # and confirm Electron comes up — catches the asar-without-node_modules crash.
      - name: Linux — launch smoke (Electron up via CDP)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -uo pipefail
          sudo apt-get install -y xvfb
          sudo apt-get install -y ./dist/*.deb
          PKG=$(dpkg-deb -f dist/*.deb Package)
          BIN=$(dpkg -L "$PKG" | while read -r f; do
            [ -f "$f" ] && [ -x "$f" ] || continue
            case "$f" in *.so|*.so.*|*.node|*chrome-sandbox|*crashpad*) continue;; esac
            case "$(file -b "$f" 2>/dev/null)" in *ELF*executable*) echo "$f"; break;; esac
          done | head -1)
          echo "package: $PKG  binary: ${BIN:-<none>}"
          if [ -z "$BIN" ]; then echo "✗ app binary not found"; exit 1; fi
          xvfb-run -a "$BIN" --no-sandbox --disable-gpu --disable-software-rasterizer --remote-debugging-port=9222 > /tmp/app.log 2>&1 &
          APP=$!; ok=0
          for i in $(seq 1 30); do
            curl -fsS http://localhost:9222/json/version >/dev/null 2>&1 && { ok=1; break; }
            kill -0 "$APP" 2>/dev/null || break
            sleep 2
          done
          echo "----- app log (tail) -----"; tail -40 /tmp/app.log || true
          kill "$APP" 2>/dev/null || true
          if grep -qi "cannot find module" /tmp/app.log; then echo "✗ asar/module crash"; exit 1; fi
          if [ "$ok" != 1 ]; then echo "✗ Electron never answered on CDP"; exit 1; fi
          echo "✓ Linux launch smoke passed"

      - name: Windows — launch smoke (no crash; CDP if reachable)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $exe = "dist/win-unpacked/GlanceTerm.exe"
          if (!(Test-Path $exe)) { $exe = (Get-ChildItem -Recurse dist -Filter GlanceTerm.exe -ErrorAction SilentlyContinue | Select-Object -First 1).FullName }
          Write-Host "launching: $exe"
          if (-not $exe) { Write-Error "GlanceTerm.exe not found"; exit 1 }
          $p = Start-Process -FilePath $exe -ArgumentList "--remote-debugging-port=9222","--no-sandbox","--disable-gpu","--disable-software-rasterizer" -PassThru
          $ok = $false
          for ($i=0; $i -lt 20; $i++) {
            try { Invoke-WebRequest -UseBasicParsing http://127.0.0.1:9222/json/version -TimeoutSec 2 | Out-Null; $ok = $true; break } catch {}
            if ($p.HasExited) { Write-Host "process exited early, code $($p.ExitCode)"; break }
            Start-Sleep 2
          }
          $alive = -not $p.HasExited
          try { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue } catch {}
          if ($ok)    { Write-Host "✓ Windows launch smoke passed (CDP up)"; exit 0 }
          if ($alive) { Write-Host "✓ Windows launch smoke passed (launched, stayed alive — no asar crash)"; exit 0 }
          Write-Error "✗ app exited early (likely an asar/startup crash)"; exit 1

      - name: Attach installers to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          # macOS: .dmg only (the .zip/.blockmap/latest-mac.yml are auto-update).
          # Linux: all package formats. Windows: setup .exe + portable .zip.
          files=(dist/*.dmg dist/*.AppImage dist/*.deb dist/*.rpm dist/*.pacman dist/*.tar.gz dist/*.exe dist/*-portable-*.zip)
          echo "uploading: ${files[*]}"
          gh release upload "${{ needs.release-please.outputs.tag_name }}" "${files[@]}" --clobber
