name: CI

# Quality gate for every pull request and every push to main: the plugin unit
# suites (ai-sidebar + mobile-bridge).
#
# NOT gated here, deliberately:
#   - lint: the fork predates Tabby's strict eslint config and carries ~1.2k
#     violations against it (no-brace `if`, init-declarations, …) — a separate
#     cleanup, not a CI prerequisite.
#   - `build:typings`: it depends on warm build artifacts (a plugin's
#     dist/index.js must already exist for a cross-plugin import like
#     mobile-bridge -> ai-sidebar to resolve) and, when they do exist, resolves
#     those imports as `any` — so it neither runs reliably on a cold checkout
#     nor meaningfully typechecks cross-plugin code. Typecheck stays a dev-time
#     check (per-package `tsc --noEmit`) until the plugins gain real `types`
#     entries or a pre-build step.
#
# Build / signing / release live in a separate workflow (phase 2) because they
# need signing secrets; see release.yml history.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Native-module build headers for the install's node-gyp steps:
      #   libfontconfig1-dev -> fontmanager-redux (FontManagerLinux.cc)
      #   libsecret-1-dev    -> keytar
      #   libarchive-tools   -> mirrors Tabby's old Linux job (bsdtar)
      # The checks below (tsc + vitest) never load these natives, but the
      # install compiles them eagerly, so the headers must be present or
      # `yarn install` fails.
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libsecret-1-dev libarchive-tools

      # Not a yarn-workspaces repo: the root postinstall (install-deps.mjs)
      # cascades the install into app/, web/ and every plugin — installing each
      # plugin's own vitest — and symlinks the local tabby-* packages. This is
      # the same dependency flow `npm run dmg:mac` relies on locally.
      - name: Install dependencies
        run: yarn install --network-timeout 1000000

      - name: Test — ai-sidebar
        working-directory: tabby-plugin-ai-sidebar
        run: yarn test

      - name: Test — mobile-bridge
        working-directory: tabby-plugin-mobile-bridge
        run: yarn test
