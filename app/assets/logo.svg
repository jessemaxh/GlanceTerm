<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="hex" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffaa55"/>
      <stop offset="1" stop-color="#ff7a3d"/>
    </linearGradient>
    <radialGradient id="cell" cx="512" cy="512" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer hexagon (hive cell) -->
  <polygon points="512,72 902,292 902,732 512,952 122,732 122,292"
           fill="url(#hex)"/>
  <polygon points="512,72 902,292 902,732 512,952 122,732 122,292"
           fill="url(#cell)"/>
  <!-- 6 inner cells forming a honeycomb pattern -->
  <g fill="#1c1f23" opacity="0.85">
    <!-- top-left -->
    <polygon points="320,330 420,272 520,330 520,446 420,504 320,446"/>
    <!-- top-right -->
    <polygon points="504,330 604,272 704,330 704,446 604,504 504,446"/>
    <!-- middle (active agent) — bright -->
    <polygon points="412,494 512,436 612,494 612,610 512,668 412,610" fill="#ffffff" opacity="0.95"/>
    <!-- bottom-left -->
    <polygon points="320,654 420,596 520,654 520,770 420,828 320,770"/>
    <!-- bottom-right -->
    <polygon points="504,654 604,596 704,654 704,770 604,828 504,770"/>
  </g>
  <!-- Terminal prompt mark > inside the bright cell -->
  <text x="512" y="588" text-anchor="middle" font-family="ui-monospace, SF Mono, Menlo, monospace"
        font-size="120" font-weight="700" fill="#1c1f23">&gt;_</text>
</svg>
